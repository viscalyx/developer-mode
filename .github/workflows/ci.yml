name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (lint, type-check, build, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Markdown lint
        run: npm run lint:md

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  safelist-check:
    name: Safelist drift guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Build React package
        run: npm run build --workspace @viscalyx/developer-mode-react

      - name: Run safelist drift-guard test
        # Re-runs the dedicated drift-guard test in isolation so a
        # safelist failure surfaces as its own CI signal, separate
        # from unrelated test churn. See
        # docs/safelist.md for what the safelist artifact is and
        # .github/instructions/overlay-safelist.instructions.md for
        # the rules it enforces.
        run: npx vitest run packages/developer-mode-react/tests/safelist.test.ts

  changeset:
    name: Verify changeset present
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Changeset status
        # `changeset status --since=origin/main` exits non-zero when
        # there are package changes without a matching changeset.
        # Repo-tooling-only PRs should not touch packages/*/src or
        # packages/*/package.json and will pass cleanly.
        run: npx changeset status --since=origin/main
