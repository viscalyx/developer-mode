name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish via Changesets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org

      # npm Trusted Publishing for `npm publish` requires npm CLI >= 11.5.1.
      # Upgrade explicitly so we are not at the mercy of the npm version bundled
      # with the Node release pinned in .nvmrc.
      - name: Upgrade npm to a Trusted-Publishing-capable version
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # `npm run release` runs `changeset publish` (after build).
          publish: npm run release
          # The default "Version Packages" PR title.
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN / NODE_AUTH_TOKEN: publishing authenticates to npm via
          # GitHub OIDC (npm Trusted Publishing). The workflow-level
          # `id-token: write` permission and a Trusted Publisher configured on
          # npmjs.com for each package (pointing at this repo + workflow file
          # `release.yml` + job `release`) are what authorize the publish.
