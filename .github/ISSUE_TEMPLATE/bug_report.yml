name: Bug report
description: Report a defect in @viscalyx/developer-mode-core or @viscalyx/developer-mode-react
labels: ["bug", "needs-triage"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - "@viscalyx/developer-mode-core"
        - "@viscalyx/developer-mode-react"
        - Both / unsure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: e.g. 22.11.0
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include a minimal reproduction if possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
