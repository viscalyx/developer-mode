version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      types:
        patterns:
          - "@types/*"
        update-types:
          - minor
          - patch
    ignore:
      # React peer-dep bumps must be coordinated with the
      # @viscalyx/developer-mode-react peerDependencies range.
      - dependency-name: react
      - dependency-name: react-dom
      - dependency-name: "@types/react"
      - dependency-name: "@types/react-dom"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
